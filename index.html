  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e8d5b0;
      --text: #f5f0e8;
      --sub: rgba(245,240,232,0.55);
    }

    html, body {
      background-color: #000 !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: #f5f0e8;
    }

    #entry {
      position: fixed; inset: 0; z-index: 200;
      background: #000;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 1.3s ease, visibility 1.3s ease;
    }
    #entry.gone { opacity: 0; visibility: hidden; pointer-events: none; }

    .entry-content {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      text-align: center; color: var(--text);
    }

    .entry-line {
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #entry:hover .entry-line { width: 80px; }

    .entry-sub {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.5em; color: var(--sub);
      opacity: 0;
      animation: entryFade 1.6s ease 0.6s forwards;
    }

    @keyframes entryFade {
      to { opacity: 1; transform: translateY(0); }
    }

    #vid {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
      image-rendering: -webkit-optimize-contrast;
    }

    #vid.on {
      opacity: 1 !important;
    }

    #veil {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%),
        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      display: none;
    }

    #veil.on {
      display: block;
    }

    #volbtn {
      position: fixed; top: 1.4rem; right: 1.4rem; z-index: 50;
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.7s, background 0.3s;
    }
    #volbtn.on { opacity: 1; }
    #volbtn:hover { background: rgba(255,255,255,0.12); }
    #volbtn svg { width: 15px; height: 15px; stroke: var(--text); fill: none; stroke-width: 1.6; }

    #side-menu {
      position: fixed;
      top: 1.4rem;
      left: 1.4rem;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    #side-menu.on { opacity: 1; }

    #menu-toggle {
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      border-radius: 4px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      transition: background 0.3s;
    }
    #menu-toggle:hover { background: rgba(0,0,0,0.65); }
    #menu-toggle span {
      display: block; width: 14px; height: 1px;
      background: var(--text); opacity: 0.7;
      transition: opacity 0.3s;
    }
    #menu-toggle:hover span { opacity: 1; }

    #menu-panel {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      width: 200px;
      background: rgba(4,4,4,0.82);
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      border-radius: 3px;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s;
    }
    #side-menu.open #menu-panel {
      opacity: 1;
      visibility: visible;
      pointer-events: all;
      transform: translateY(0);
    }

    .menu-label {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.44rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      padding: 0.6rem 1rem 0.2rem;
    }

    .menu-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.55rem 1rem;
      text-decoration: none;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sub);
      transition: color 0.2s, background 0.2s;
    }
    .menu-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .menu-item svg { width: 11px; height: 11px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.6; }
    .menu-item.highlight {
      color: var(--accent);
      background: rgba(232,213,176,0.06);
      border-left: 2px solid rgba(232,213,176,0.5);
      padding-left: calc(1rem - 2px);
      letter-spacing: 0.22em;
    }
    .menu-item.highlight:hover {
      color: #fff;
      background: rgba(232,213,176,0.1);
      border-left-color: var(--accent);
    }
    .menu-item.highlight .badge {
      margin-left: auto;
      font-size: 0.38rem;
      letter-spacing: 0.1em;
      background: rgba(232,213,176,0.15);
      border: 1px solid rgba(232,213,176,0.25);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .menu-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 0.2rem 0; }

    #socials {
      position: fixed;
      bottom: 2.2rem; left: 0; right: 0;
      z-index: 40;
      display: flex; justify-content: center; align-items: center;
      gap: 0.7rem;
      opacity: 0; transition: opacity 1.3s ease 0.7s;
    }
    #socials.on { opacity: 1; }

    .s-btn {
      display: flex; align-items: center; gap: 0.42rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--sub);
      padding: 0.56rem 1.3rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(16px);
      cursor: pointer;
      text-decoration: none;
      border-radius: 1px;
      transition: color 0.3s, border-color 0.3s, background 0.3s;
      white-space: nowrap;
    }
    .s-btn svg { width: 13px; height: 13px; flex-shrink: 0; transition: transform 0.3s; }
    .s-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.26); background: rgba(0,0,0,0.48); }
    .s-btn:hover svg { transform: scale(1.18); }

    .sep { width: 1px; height: 11px; background: rgba(255,255,255,0.13); }

    @media (max-width: 480px) {

      .s-btn { padding: 0.5rem 0.9rem; font-size: 0.54rem; letter-spacing: 0.28em; }

  <script>
    const VIDEOS = ['simarik.mp4', 'bib.mp4', 'dene.mp4', 'mufasa.mp4', 'unuttumm.mp4'];

    const vid    = document.getElementById('vid');
    const volBtn = document.getElementById('volbtn');
    const icoOn  = document.getElementById('ico-on');
    const icoOff = document.getElementById('ico-off');
    const sideMenu = document.getElementById('side-menu');

    function getSmartVideo() {
      const lastOne = sessionStorage.getItem('lastVid');
      let selected;
      if (VIDEOS.length > 1) {
        do {
          selected = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];
        } while (selected === lastOne);
      } else {
        selected = VIDEOS[0];
      }
      sessionStorage.setItem('lastVid', selected);
      return selected;
    }

    vid.src = getSmartVideo();

    vid.addEventListener('ended', () => {
      const nextVid = getSmartVideo();
      vid.style.opacity = '0';
      setTimeout(() => {
        vid.src = nextVid;
        vid.load();
        vid.play().then(() => {
          vid.style.opacity = '1';
        }).catch(err => console.log(err));
      }, 500);
    });

    function go() {
      const entry = document.getElementById('entry');
      const veil  = document.getElementById('veil');

      vid.muted = false;
      vid.volume = 0.7;

      vid.play().then(() => {
        entry.classList.add('gone');
        veil.classList.add('on');
        vid.classList.add('on');
        volBtn.classList.add('on');
        document.getElementById('socials').classList.add('on');
        sideMenu.classList.add('on');
      }).catch(() => {
        vid.muted = true;
        vid.play();
        entry.classList.add('gone');
        veil.classList.add('on');
        vid.classList.add('on');
        volBtn.classList.add('on');
        document.getElementById('socials').classList.add('on');
        sideMenu.classList.add('on');
      });
    }

    function toggleMute() {
      vid.muted = !vid.muted;
      icoOn.style.display  = vid.muted ? 'none' : '';
      icoOff.style.display = vid.muted ? '' : 'none';
    }

    function toggleMenu() {
      sideMenu.classList.toggle('open');
    }

    document.addEventListener('click', (e) => {
      if (!sideMenu.contains(e.target)) {
        sideMenu.classList.remove('open');
      }
    });
  </script>
